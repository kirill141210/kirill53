<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StuntBike — Вход</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: #0b0d0f; color: #f0f2f5;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative;
        }
        .bg-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a1e24, #0a0c0e 80%); z-index: -2;
        }
        .bg-pattern::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.03"><path d="M70 10 L90 40 L70 70 L50 40 Z M130 10 L150 40 L130 70 L110 40 Z M100 50 L120 80 L100 110 L80 80 Z" fill="white"/><circle cx="40" cy="150" r="20" fill="white"/><circle cx="160" cy="150" r="20" fill="white"/></svg>');
            background-repeat: repeat; background-size: 180px 180px; z-index: -1;
            animation: drift 60s linear infinite;
        }
        @keyframes drift { 0% { transform: translate(0, 0); } 100% { transform: translate(-100px, -50px); } }

        .auth-container {
            background: #12171e; border-radius: 40px; padding: 48px 40px;
            width: 100%; max-width: 480px; border: 1px solid #1f262e;
            box-shadow: 0 30px 80px -20px #000000cc; position: relative;
            backdrop-filter: blur(4px);
        }

        .auth-container .back-link {
            position: absolute; top: 20px; left: 24px; color: #8892a0; text-decoration: none;
            font-size: 14px; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .auth-container .back-link:hover { color: #ff6b35; }

        .auth-header { text-align: center; margin: 12px 0 32px; }
        .auth-header .logo {
            font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; letter-spacing: 1px;
            background: linear-gradient(135deg, #ff4d4d, #ff9a00, #ff6b35);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            text-transform: uppercase; display: inline-flex; align-items: center; gap: 10px;
        }
        .auth-header .logo i { -webkit-text-fill-color: initial; color: #ff6b35; font-size: 28px; }
        .auth-header h2 { font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 900; margin-top: 12px; letter-spacing: -0.5px; text-transform: uppercase; }
        .auth-header h2 span { color: #ff6b35; }
        .auth-header p { color: #8892a0; margin-top: 8px; font-size: 15px; }

        .tabs {
            display: flex; background: #0c1015; border-radius: 60px; padding: 4px; margin-bottom: 32px; border: 1px solid #1f262e;
        }
        .tabs button {
            flex: 1; background: transparent; border: none; padding: 12px 0; border-radius: 40px;
            font-weight: 700; font-size: 15px; color: #8892a0; cursor: pointer; transition: 0.3s; font-family: 'Inter', sans-serif;
        }
        .tabs button.active { background: #ff6b35; color: #0b0d0f; box-shadow: 0 8px 20px -6px #ff6b3560; }
        .tabs button:hover:not(.active) { color: #fff; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; font-size: 14px; color: #b0b8c5; margin-bottom: 6px; }
        .form-group .input-wrap {
            display: flex; align-items: center; background: #0c1015; border-radius: 16px;
            border: 1.5px solid #1f262e; transition: 0.25s; padding: 0 16px;
        }
        .form-group .input-wrap:focus-within { border-color: #ff6b35; box-shadow: 0 0 0 3px #ff6b3520; }
        .form-group .input-wrap i { color: #5a6577; font-size: 16px; width: 20px; }
        .form-group .input-wrap input {
            width: 100%; background: transparent; border: none; padding: 16px 12px;
            font-size: 15px; color: #f0f2f5; font-family: 'Inter', sans-serif; outline: none;
        }
        .form-group .input-wrap input::placeholder { color: #5a6577; }

        .form-options {
            display: flex; justify-content: space-between; align-items: center; margin: 8px 0 24px; font-size: 14px;
        }
        .form-options label { display: flex; align-items: center; gap: 8px; color: #a8b2c0; cursor: pointer; }
        .form-options label input[type="checkbox"] { accent-color: #ff6b35; width: 16px; height: 16px; }
        .form-options a { color: #ff6b35; text-decoration: none; font-weight: 600; }
        .form-options a:hover { text-decoration: underline; }

        .btn-auth {
            width: 100%; background: linear-gradient(135deg, #ff6b35, #ff4d4d); border: none;
            padding: 16px; border-radius: 60px; font-weight: 700; font-size: 17px;
            color: #0b0d0f; display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.3s; cursor: pointer; font-family: 'Inter', sans-serif;
            box-shadow: 0 10px 30px -8px #ff6b3540; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-auth:hover { transform: scale(1.02); box-shadow: 0 16px 40px -6px #ff6b3560; }

        .auth-divider {
            display: flex; align-items: center; gap: 16px; margin: 28px 0 20px; color: #5a6577; font-size: 13px;
        }
        .auth-divider::before,
        .auth-divider::after { content: ''; flex: 1; height: 1px; background: #1f262e; }

        .social-auth { display: flex; gap: 12px; }
        .social-auth button {
            flex: 1; background: #0c1015; border: 1px solid #1f262e; border-radius: 16px;
            padding: 14px 0; color: #b0b8c5; font-size: 18px; cursor: pointer; transition: 0.3s;
        }
        .social-auth button:hover { border-color: #ff6b35; color: #fff; background: #1a2128; }

        .auth-footer { text-align: center; margin-top: 24px; color: #7a8594; font-size: 14px; }
        .auth-footer a { color: #ff6b35; text-decoration: none; font-weight: 700; }
        .auth-footer a:hover { text-decoration: underline; }

        .form-container { display: none; }
        .form-container.active { display: block; }

        @media (max-width: 520px) {
            .auth-container { padding: 32px 20px; }
            .auth-header h2 { font-size: 22px; }
            .tabs button { font-size: 13px; padding: 10px 0; }
            .form-group .input-wrap input { padding: 14px 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="auth-container">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>

    <div class="auth-header">
        <div class="logo"><i class="fas fa-bicycle"></i> Stunt<span>Bike</span></div>
        <h2>Добро пожаловать <span>!</span></h2>
        <p>Войди или создай аккаунт, чтобы начать</p>
    </div>

    <div class="tabs">
        <button class="active" data-tab="login">Вход</button>
        <button data-tab="register">Регистрация</button>
    </div>

    <div id="login-form" class="form-container active">
        <form>
            <div class="form-group">
                <label>Email или логин</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="example@stunt.com" required />
                </div>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="••••••••" required />
                </div>
            </div>
            <div class="form-options">
                <label><input type="checkbox" checked /> Запомнить меня</label>
                <a href="#">Забыли пароль?</a>
            </div>
            <button type="submit" class="btn-auth"><i class="fas fa-sign-in-alt"></i> Войти</button>
        </form>
        <div class="auth-divider">или через соцсети</div>
        <div class="social-auth">
            <button><i class="fab fa-google"></i></button>
            <button><i class="fab fa-vk"></i></button>
            <button><i class="fab fa-telegram-plane"></i></button>
        </div>
        <div class="auth-footer">
            Нет аккаунта? <a href="#" id="switch-to-register">Зарегистрироваться</a>
        </div>
    </div>

    <div id="register-form" class="form-container">
        <form>
            <div class="form-group">
                <label>Имя</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Алексей" required />
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="alex@stunt.com" required />
                </div>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="минимум 6 символов" required />
                </div>
            </div>
            <div class="form-group">
                <label>Подтвердите пароль</label>
                <div class="input-wrap">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" placeholder="повторите пароль" required />
                </div>
            </div>
            <div class="form-options">
                <label>
                    <input type="checkbox" required /> Я согласен с <a href="#" style="color:#ff6b35;text-decoration:none;">условиями</a>
                </label>
            </div>
            <button type="submit" class="btn-auth"><i class="fas fa-user-plus"></i> Создать аккаунт</button>
        </form>
        <div class="auth-divider">или через соцсети</div>
        <div class="social-auth">
            <button><i class="fab fa-google"></i></button>
            <button><i class="fab fa-vk"></i></button>
            <button><i class="fab fa-telegram-plane"></i></button>
        </div>
        <div class="auth-footer">
            Уже есть аккаунт? <a href="#" id="switch-to-login">Войти</a>
        </div>
    </div>
</div>

<script>
    const tabs = document.querySelectorAll('.tabs button');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');

    tabs.forEach(tab => {
        tab.addEventListener('click', function() {
            tabs.forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            const target = this.dataset.tab;
            if (target === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
            } else {
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
            }
        });
    });

    document.getElementById('switch-to-register').addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelector('.tabs button[data-tab="register"]').click();
    });

    document.getElementById('switch-to-login').addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelector('.tabs button[data-tab="login"]').click();
    });
</script>

</body>
</html>
