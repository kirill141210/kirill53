        body { font-family: 'Inter', sans-serif; background: #0b0d0f; color: #f0f2f5; min-height: 100vh; }

        .bg-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a1e24, #0a0c0e 80%); z-index: -2;
        }
        .bg-pattern::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;

            animation: drift 60s linear infinite;
        }
        @keyframes drift { 0% { transform: translate(0, 0); } 100% { transform: translate(-100px, -50px); } }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 30px; }

        header {

        }

        .logo {
            font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; letter-spacing: 1px;
            background: linear-gradient(135deg, #ff4d4d, #ff9a00, #ff6b35);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            text-transform: uppercase; display: flex; align-items: center; gap: 10px; text-decoration: none;
            animation: glow 3s ease-in-out infinite alternate;
        }
        @keyframes glow { 0% { filter: drop-shadow(0 0 5px rgba(255, 107, 53, 0.3)); } 100% { filter: drop-shadow(0 0 20px rgba(255, 107, 53, 0.6)); } }
        .logo i { -webkit-text-fill-color: initial; color: #ff6b35; font-size: 28px; }

        .nav-links { display: flex; gap: 32px; font-weight: 600; font-size: 13px; letter-spacing: 0.5px; text-transform: uppercase; }
        .nav-links a { color: #b0b8c5; text-decoration: none; transition: 0.3s; position: relative; }
        .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0%; height: 2px; background: #ff6b35; transition: 0.3s; box-shadow: 0 0 10px #ff6b35; }
        .nav-links a:hover { color: #fff; }
        .nav-links a:hover::after { width: 100%; }
        .nav-links a.active { color: #fff; }
        .nav-links a.active::after { width: 100%; }

        .header-actions { display: flex; align-items: center; gap: 16px; }
        .header-actions i { font-size: 20px; color: #b0b8c5; transition: 0.3s; cursor: pointer; }
        .header-actions i:hover { color: #ff6b35; transform: scale(1.1); }

        .btn-outline {
            border: 1.5px solid #ff6b35; background: transparent; padding: 8px 20px; border-radius: 40px;
            color: #fff; font-weight: 700; font-size: 12px; transition: 0.3s; text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-outline:hover { background: #ff6b35; color: #0b0d0f; box-shadow: 0 0 30px rgba(255, 107, 53, 0.4); transform: scale(1.05); }

        .cart-icon-wrap { position: relative; cursor: pointer; }
        .cart-count {
            position: absolute; top: -8px; right: -10px; background: #ff6b35; color: #0b0d0f;
            font-size: 10px; font-weight: 800; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        .breadcrumb { padding: 16px 0 8px; color: #5a6577; font-size: 14px; }
        .breadcrumb a { color: #8892a0; text-decoration: none; transition: 0.2s; }
        .breadcrumb a:hover { color: #ff6b35; }
        .breadcrumb span { color: #b0b8c5; }

        .page-header {
            display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; margin: 10px 0 30px;
        }
        .page-header h1 { font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }
        .page-header h1 span { color: #ff6b35; }
        .page-header p { color: #8892a0; font-size: 16px; }

        .filters {
            display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px;
            padding: 16px 0; border-top: 1px solid rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .filters button {
            padding: 8px 24px; border-radius: 40px; border: 1.5px solid #1f262e;
            background: transparent; color: #b0b8c5; font-weight: 600; font-size: 13px;
            cursor: pointer; transition: 0.3s; font-family: 'Inter', sans-serif;
            text-transform: uppercase; letter-spacing: 0.5px;

        .filters button:hover { border-color: #ff6b35; color: #fff; }
        .filters button.active { background: #ff6b35; border-color: #ff6b35; color: #0b0d0f; }

        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; margin: 30px 0 60px;
        }

        .menu-item {
            background: #12171d; border-radius: 30px; padding: 24px; border: 1px solid #1f262e;
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .menu-item::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, #ff6b35, #ffb347, #ff4d4d); transform: scaleX(0); transition: 0.4s;

        .menu-item:hover::before { transform: scaleX(1); }
        .menu-item:hover { border-color: #ff6b3570; transform: translateY(-8px); box-shadow: 0 30px 50px -15px #000000cc; }

        .menu-item .item-img {

        .menu-item:hover .item-img i { transform: scale(1.05) rotate(-5deg); color: #ff6b35; }

        .menu-item .item-img .badge {

        .badge.new { background: #00c853; color: #fff; }
        .badge.hot { background: #ff6b35; color: #0b0d0f; animation: badgePulse 1.5s ease-in-out infinite; }
        .badge.stunt { background: #7c4dff; color: #fff; }
        .badge.regular { background: #2196f3; color: #fff; }

            border: 1px solid #ff6b35; padding: 16px 28px; border-radius: 16px;
            color: #fff; font-weight: 600; z-index: 2000;
            transform: translateY(100px); opacity: 0; transition: 0.5s ease;
            box-shadow: 0 10px 30px #00000080; display: flex; align-items: center; gap: 12px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast i { color: #ff6b35; font-size: 20px; }

        @media (max-width: 768px) {
            .nav-links { display: none; }

            .menu-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
            .page-header h1 { font-size: 26px; }
            .filters { gap: 6px; }
            .filters button { padding: 6px 14px; font-size: 11px; }
        }

    </style>
</head>

        { id: 'p34', name: 'Вилка City Suspension', category: 'frame', price: 200, oldPrice: null, desc: 'Вилка с амортизацией 100мм', specs: 'алюминий | 100мм ход', badge: 'regular', icon: 'fa-border-all' },
        { id: 'p35', name: 'Рама Dirt Pro', category: 'frame', price: 380, oldPrice: null, desc: 'Усиленная рама для дёрта', specs: '4130 | 24" | 5.2 кг', badge: null, icon: 'fa-border-all' },
    ];

    // ============================================================
    // 2. РЕНДЕР
    // ============================================================
    const grid = document.getElementById('menuGrid');
    const itemsCount = document.getElementById('itemsCount');

    function renderProducts(filter = 'all') {
        const filtered = filter === 'all' ? allProducts : allProducts.filter(p => p.category === filter);

        if (filtered.length === 0) {
            grid.innerHTML = `
                <div style="grid-column:1/-1; text-align:center; padding:60px 0; color:#8892a0;">
                    <i class="fas fa-search" style="font-size:48px; margin-bottom:16px; display:block;"></i>
                    <p style="font-size:18px;">Нет товаров в этой категории</p>
                </div>
            `;
            itemsCount.textContent = '0';
            return;
        }

        itemsCount.textContent = filtered.length;

        grid.innerHTML = filtered.map(p => {
            const badgeMap = {
                'sale': '<span class="badge sale">🔥 Скидка</span>',
                'new': '<span class="badge new">✨ Новинка</span>',
                'hot': '<span class="badge hot">⚡ Хит</span>',
                'stunt': '<span class="badge stunt">🔥 Стант</span>',
                'regular': '<span class="badge regular">🚲 Обычные</span>'
            };
            const badgeHtml = p.badge ? badgeMap[p.badge] || '' : '';
            const oldPriceHtml = p.oldPrice ? `<span class="old-price">$${p.oldPrice}</span>` : '';

            return `
                <div class="menu-item" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">
                    <div class="item-img">
                        <i class="fas ${p.icon}"></i>
                        ${badgeHtml}
                    </div>
                    <h3>${p.name}</h3>
                    <div class="category-tag"><i class="fas fa-tag"></i> ${p.category}</div>
                    <div class="desc">${p.desc}</div>
                    <div class="specs"><span><i class="fas fa-info-circle"></i> ${p.specs}</span></div>
                    <div class="bottom-row">
                        <div>
                            <span class="price">$${p.price}</span>
                            ${oldPriceHtml}
                        </div>
                        <div class="actions">
                            <button class="add-cart-btn" onclick="addToCart('${p.id}', '${p.name}', ${p.price})">
                                <i class="fas fa-cart-plus"></i>
                            </button>
                            <a href="order.html?product=${encodeURIComponent(p.id)}" class="order-btn">
                                <i class="fas fa-bolt"></i> Заказать
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ============================================================
    // 3. ФИЛЬТРЫ
    // ============================================================
    document.querySelectorAll('.filters button').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            renderProducts(this.dataset.filter);
        });
    });

    // ============================================================
    // 4. КОРЗИНА
    // ============================================================
    function getCart() { return JSON.parse(localStorage.getItem('stuntCart')) || []; }

    function saveCart(cart) {
        localStorage.setItem('stuntCart', JSON.stringify(cart));
        updateCartCount();
    }

    function updateCartCount() {
        const cart = getCart();
        const count = cart.reduce((sum, item) => sum + item.qty, 0);
        document.getElementById('cartCount').textContent = count;
    }

    function addToCart(id, name, price) {
        const cart = getCart();
        const existing = cart.find(item => item.id === id);
        if (existing) existing.qty += 1;
        else cart.push({ id, name, price, qty: 1 });
        saveCart(cart);
        showToast(`${name} добавлен в корзину!`);
    }

    // ============================================================
    // 5. TOAST
    // ============================================================
    function showToast(message) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = message;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ============================================================
    // 6. ИНИЦИАЛИЗАЦИЯ
    // ============================================================
    renderProducts('all');
    updateCartCount();

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('product');
    if (productId) {
        const product = allProducts.find(p => p.id === productId);
        if (product) {
            setTimeout(() => { addToCart(product.id, product.name, product.price); }, 500);
        }
    }
</script>
